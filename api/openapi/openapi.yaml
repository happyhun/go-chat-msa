openapi: 3.0.3
info:
  title: Go Chat MSA API
  version: "1.0.0"
  description: |
    Go Chat MSA 프로젝트의 REST API 명세서입니다.
    - 에러 응답은 모두 RFC 7807 (Problem Details) 형식을 따릅니다.
    - 보안을 위해 JWT(Access Token)와 HttpOnly Cookie(Refresh Token)를 혼합하여 사용합니다.
    - 웹소켓 연결은 1회용 단기 티켓 기반으로 수행됩니다.

servers:
  - url: http://localhost:8080
    description: API Gateway (REST API 전용)
  - url: http://localhost:8088
    description: WebSocket Gateway (WS / 상태 체크 전용)

tags:
  - name: System
    description: 시스템 상태 점검 및 메트릭 수집
  - name: Auth
    description: 사용자 가입, 로그인, 로그아웃 및 토큰 관리
  - name: Room
    description: 채팅방 생성, 수정, 삭제 및 참여 관리
  - name: Message
    description: 채팅방 메시지 내역 조회 및 동기화
  - name: WebSocket
    description: 실시간 채팅을 위한 웹소켓 연결 관리

paths:
  /health:
    get:
      tags:
        - System
      summary: 시스템 상태 점검 (Liveness Probe)
      description: API Gateway와 WebSocket Gateway의 정상 구동 여부를 확인합니다.
      operationId: checkHealth
      responses:
        '200':
          description: 정상 상태
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
        '429':
          $ref: '#/components/responses/TooManyRequests'


  /users:
    post:
      tags:
        - Auth
      summary: 신규 회원 가입
      description: 새로운 사용자를 생성합니다. (IP 당 5 RPS 제한)
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: 회원 가입 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignupResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/token:
    post:
      tags:
        - Auth
      summary: 로그인 및 토큰 발급
      description: 로그인 성공 시 Access Token을 응답 본문으로, Refresh Token을 보안 쿠키로 반환합니다. (IP 당 5 RPS 제한)
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공
          headers:
            Set-Cookie:
              description: Refresh Token 쿠키 (HttpOnly, Secure, Path=/auth)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

    delete:
      tags:
        - Auth
      summary: 로그아웃
      description: 현재 세션을 종료하고 데이터베이스에서 Refresh Token을 폐기합니다. 보안 쿠키에 담긴 Refresh Token으로 인증합니다.
      operationId: logout
      responses:
        '204':
          description: 로그아웃 성공 (응답 본문 없음)
          headers:
            Set-Cookie:
              description: Refresh Token 쿠키 만료 헤더
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Access Token 재발급
      description: 보안 쿠키에 담긴 Refresh Token을 확인하여 새로운 Access Token을 발급합니다.
      operationId: refreshToken
      responses:
        '200':
          description: 재발급 성공
          headers:
            Set-Cookie:
              description: 새로 갱신된 Refresh Token 쿠키 (RTR 적용)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /me/rooms:
    get:
      tags:
        - Room
      summary: 참여 중인 채팅방 목록 조회
      description: 현재 인증된 사용자가 참여 중인 채팅방 목록을 반환합니다.
      operationId: listJoinedRooms
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /rooms:
    get:
      tags:
        - Room
      summary: 채팅방 검색
      description: 전체 채팅방을 대상으로 이름 기반 검색을 수행합니다.
      operationId: searchRooms
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          description: "검색어 (생략 시 전체 채팅방 목록 반환)"
          schema:
            type: string
        - name: limit
          in: query
          description: 페이지당 개수 (기본 20, 최대 100)
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          description: 검색 시작 위치
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: 검색 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

    post:
      tags:
        - Room
      summary: 채팅방 생성
      description: 새로운 채팅방을 만듭니다. 방을 만든 사람은 자동으로 방장이 되며 해당 방에 참여합니다.
      operationId: createRoom
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomRequest'
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateRoomResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /rooms/{id}:
    patch:
      tags:
        - Room
      summary: 채팅방 정보 수정
      description: 방장만 호출 가능하며, 채팅방의 이름과 최대 정원을 변경합니다.
      operationId: updateRoom
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 채팅방 UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoomRequest'
      responses:
        '204':
          description: 수정 성공
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

    delete:
      tags:
        - Room
      summary: 채팅방 삭제
      description: 방장만 호출 가능하며, 채팅방을 삭제(Soft Delete)하고 해당 방의 모든 웹소켓 연결을 강제 종료합니다.
      operationId: deleteRoom
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 채팅방 UUID
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 삭제 성공
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /rooms/{id}/members:
    get:
      tags:
        - Room
      summary: 채팅방 멤버 목록 조회
      description: 채팅방에 참여 중인 멤버 목록을 반환합니다. 요청자가 해당 방의 멤버여야 합니다.
      operationId: listRoomMembers
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 채팅방 UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 멤버 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      $ref: '#/components/schemas/RoomMemberInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /rooms/{id}/members/me:
    put:
      tags:
        - Room
      summary: 채팅방 참여
      description: 대상 채팅방에 참여합니다. 인원이 꽉 찼다면 실패합니다. (이미 참여 중인 경우에도 성공 반환)
      operationId: joinRoom
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 채팅방 UUID
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 참여 성공
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: 정원 초과로 참여 불가
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '429':
          $ref: '#/components/responses/TooManyRequests'

    delete:
      tags:
        - Room
      summary: 채팅방 나가기
      description: 채팅방에서 퇴장합니다.
      operationId: leaveRoom
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 채팅방 UUID
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: 퇴장 성공
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /rooms/{id}/messages:
    get:
      tags:
        - Message
      summary: 메시지 내역 조회 및 동기화
      description: |
        채팅방의 메시지를 가져옵니다. 본인이 방에 참여한 시점 이후의 메시지만 조회됩니다.
        - 과거 내역 조회: `last_seq` 파라미터 없이 호출하면 가장 최근 메시지부터 역순으로 반환합니다.
        - 누락분 동기화: `last_seq` 파라미터를 포함해 호출하면 해당 번호 이후의 메시지를 정순으로 반환합니다.
      operationId: listMessages
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: 채팅방 UUID
          schema:
            type: string
            format: uuid
        - name: last_seq
          in: query
          description: 동기화를 위해 클라이언트가 마지막으로 받은 메시지의 시퀀스 번호
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          description: 가져올 메시지 수 (기본 조회 시 100, 동기화 시 50)
          schema:
            type: integer
      responses:
        '200':
          description: 메시지 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/MessageInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /ws/ticket:
    post:
      tags:
        - WebSocket
      summary: 웹소켓 연결용 일회용 티켓 발급
      description: |
        웹소켓 연결 전 인증을 위해 호출합니다.
        발급받은 티켓의 유효기간은 30초이며 한 번만 사용할 수 있습니다.
      operationId: createWSTicket
      security:
        - bearerAuth: []
      servers:
        - url: http://localhost:8088
          description: WebSocket Gateway
      responses:
        '200':
          description: 티켓 발급 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  ticket:
                    type: string
                    format: uuid
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /ws:
    get:
      tags:
        - WebSocket
      summary: 웹소켓 핸드셰이크 (연결 요청)
      description: |
        발급받은 티켓을 사용하여 채팅방과 양방향 실시간 연결을 맺습니다.
        `ws://` 또는 `wss://` 프로토콜을 사용해야 합니다.
      operationId: connectWS
      servers:
        - url: ws://localhost:8088
          description: WebSocket Gateway
      parameters:
        - name: room_id
          in: query
          required: true
          description: 접속할 채팅방 UUID
          schema:
            type: string
            format: uuid
        - name: ticket
          in: query
          required: true
          description: 발급받은 일회용 인증 티켓
          schema:
            type: string
            format: uuid
      responses:
        '101':
          description: 연결 성공 (Switching Protocols)
        '400':
          description: 필수 파라미터가 누락됨
        '401':
          description: 인증 실패 (잘못되었거나 만료된 티켓)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "API 요청 시 Header에 'Authorization: Bearer <Access Token>' 형식으로 포함합니다."

  schemas:

    # Auth
    SignupRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 2
          maxLength: 12
          pattern: '^[a-zA-Z0-9가-힣]+$'
          description: "영문, 숫자, 한글 허용 (2~12자)"
        password:
          type: string
          minLength: 10
          maxLength: 64
          pattern: '^(?:(?=.*[a-z])(?=.*[A-Z])(?=.*\d)|(?=.*[a-z])(?=.*[A-Z])(?=.*[^a-zA-Z\d])|(?=.*[a-z])(?=.*\d)(?=.*[^a-zA-Z\d])|(?=.*[A-Z])(?=.*\d)(?=.*[^a-zA-Z\d])).{10,64}$'
          description: "대/소문자, 숫자, 특수문자 중 3가지 이상 조합 (10자 이상)"

    SignupResponse:
      type: object
      properties:
        user_id:
          type: string
          format: uuid

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    LoginResponse:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        access_token:
          type: string
          description: "수명이 짧은 JWT 인증 토큰"

    RefreshResponse:
      type: object
      properties:
        access_token:
          type: string
          description: "새로 발급된 JWT 인증 토큰"

    # Room
    CreateRoomRequest:
      type: object
      required: [name, capacity]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        capacity:
          type: integer
          minimum: 1
          maximum: 1000

    CreateRoomResponse:
      type: object
      properties:
        room_id:
          type: string
          format: uuid

    UpdateRoomRequest:
      type: object
      required: [name, capacity]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        capacity:
          type: integer
          minimum: 1
          maximum: 1000

    RoomListResponse:
      type: object
      properties:
        rooms:
          type: array
          items:
            $ref: '#/components/schemas/RoomInfo'
        total_count:
          type: integer
          description: "총 검색 결과 수 (검색어를 사용했을 때만 포함됨)"

    RoomInfo:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        manager_id:
          type: string
          format: uuid
        capacity:
          type: integer
        member_count:
          type: integer
          description: "채팅방에 참여 중인 멤버 수"
        joined_at:
          type: string
          format: date-time
          description: "방에 참여한 시간 (참여 중인 방 조회 시에만 포함)"

    RoomMemberInfo:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        username:
          type: string
        joined_at:
          type: string
          format: date-time

    # Message
    MessageInfo:
      type: object
      properties:
        id:
          type: string
          description: 메시지 고유 식별자 (UUID v7)
        room_id:
          type: string
          format: uuid
        sender_id:
          type: string
          format: uuid
        content:
          type: string
        type:
          type: string
          description: "메시지 종류 ('chat' 또는 'system')"
        timestamp:
          type: string
          format: date-time
        sequence_number:
          type: integer
          format: int64
          description: "방 내부에서의 순서를 보장하는 고유 번호"

    # Common
    ProblemDetails:
      type: object
      description: 에러 발생 시 반환되는 표준 형식 (RFC 7807)
      properties:
        type:
          type: string
          example: "about:blank"
        title:
          type: string
          example: "Bad Request"
        status:
          type: integer
          example: 400
        detail:
          type: string
          example: "필수 값이 누락되었습니다."

  responses:
    BadRequest:
      description: "요청 값이 잘못됨 (예: 규칙 위반, 누락 등)"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Unauthorized:
      description: "인증 실패 (토큰 없음, 만료, 변조)"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Forbidden:
      description: "접근 권한 없음 (예: 방장이 아님)"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: "요청한 대상을 찾을 수 없음"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Conflict:
      description: "상태 충돌 (예: 아이디 중복, 방 정원 초과)"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    TooManyRequests:
      description: "요청 빈도 초과 (Rate Limit)"
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
